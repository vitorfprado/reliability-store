# Config do estágio de produção: serve o SPA estático.
# nginx-unprivileged escuta em 8080 e roda como usuário não-root (uid 101).
# Em EKS, o Ingress Controller cuida de TLS e roteamento externo.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão para reduzir payload servido
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets com hash no nome podem ser cacheados agressivamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback de SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
