name: CI - product-service

# Push em main com mudanças no serviço -> build + push versão dev.
# Push de tag vX.Y.Z -> build + push release (filtro de paths não se aplica a tags).
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "microservices/product-service/**"
      - ".github/workflows/ci-product-service.yml"
      - ".github/workflows/_docker-ci.yml"
  pull_request:
    paths:
      - "microservices/product-service/**"
      - ".github/workflows/ci-product-service.yml"
      - ".github/workflows/_docker-ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-product-service-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/_docker-ci.yml
    with:
      service-name: product-service
      context: microservices/product-service
      target: runtime
      stack: python
    secrets: inherit
