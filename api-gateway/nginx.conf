events {
    worker_connections 1024;
}

http {
    # Suporte a WebSocket (necessário para o Vite HMR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Propaga headers de trace W3C para manter o contexto distribuído
    proxy_set_header traceparent  $http_traceparent;
    proxy_set_header tracestate   $http_tracestate;

    upstream product_service {
        server product-service:8001;
    }

    upstream order_service {
        server order-service:8002;
    }

    upstream frontend_service {
        server frontend:5173;
    }

    server {
        listen 80;

        # Rotas de API → microserviços (prefixos específicos têm prioridade sobre /)
        location /products {
            proxy_pass http://product_service;
        }

        location /checkout {
            proxy_pass http://order_service;
        }

        location /orders {
            proxy_pass http://order_service;
        }

        location /admin {
            proxy_pass http://order_service;
        }

        location /health {
            proxy_pass http://order_service;
        }

        # Frontend (Vite dev server) — inclui WebSocket para HMR
        location / {
            proxy_pass http://frontend_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
